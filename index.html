<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شريط المهام — EL LWAA</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  background: #f0f4f8;
  color: #1a2332;
  direction: rtl;
  min-height: 100vh;
}

/* ===== LOGIN SCREEN ===== */
#loginScreen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(145deg, #0f2847 0%, #1a4480 60%, #1e5fad 100%);
  padding: 32px 20px;
}

.login-logo {
  color: #fff;
  font-size: 2.2rem;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 4px;
}

.login-tagline {
  color: rgba(255,255,255,0.55);
  font-size: 0.95rem;
  margin-bottom: 40px;
}

.dept-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
  width: 100%;
  max-width: 720px;
}

.dept-card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  padding: 18px 12px;
  text-align: center;
  cursor: pointer;
  color: #fff;
  font-size: 0.9rem;
  font-weight: 600;
  transition: all 0.18s ease;
}

.dept-card:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.35);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
}

.dept-icon { font-size: 1.9rem; margin-bottom: 8px; }

/* ===== DASHBOARD ===== */
#dashboard { display: none; }

.topbar {
  background: linear-gradient(90deg, #0f2847 0%, #1a4480 100%);
  color: #fff;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}

.topbar-title { font-size: 1.1rem; font-weight: 700; }

.topbar-right { display: flex; align-items: center; gap: 12px; }

.dept-pill {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 600;
}

.back-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  padding: 5px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.85rem;
  transition: background 0.15s;
}
.back-btn:hover { background: rgba(255,255,255,0.15); }

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  padding: 20px 24px 8px;
}

.stat-box {
  background: #fff;
  border-radius: 12px;
  padding: 16px 20px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
  text-align: center;
  border-top: 3px solid transparent;
}

.stat-box.s-total  { border-top-color: #1a4480; }
.stat-box.s-new    { border-top-color: #64748b; }
.stat-box.s-active { border-top-color: #2563eb; }
.stat-box.s-urgent { border-top-color: #dc2626; }

.stat-num  { font-size: 2rem; font-weight: 800; color: #1a2332; }
.stat-label{ font-size: 0.78rem; color: #94a3b8; margin-top: 2px; }

/* Filters */
.filter-bar {
  padding: 12px 24px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.f-btn {
  padding: 6px 18px;
  border-radius: 20px;
  border: 2px solid #e2e8f0;
  background: #fff;
  color: #475569;
  font-family: inherit;
  font-size: 0.83rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.f-btn:hover  { border-color: #1a4480; color: #1a4480; }
.f-btn.active { background: #1a4480; color: #fff; border-color: #1a4480; }

/* Tasks grid */
.tasks-wrap {
  padding: 4px 24px 32px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 14px;
}

.task-card {
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
  overflow: hidden;
  border-right: 5px solid #cbd5e1;
  transition: box-shadow 0.18s, transform 0.18s;
}
.task-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.11); transform: translateY(-2px); }

/* Border color by deadline status */
.task-card[data-ds="منتهي"]    { border-right-color: #dc2626; }
.task-card[data-ds="خطر"]     { border-right-color: #ea580c; }
.task-card[data-ds="قريب جدا"] { border-right-color: #d97706; }
.task-card[data-ds="قريب"]    { border-right-color: #ca8a04; }
.task-card[data-ds="مريح"]    { border-right-color: #16a34a; }

.card-head {
  padding: 14px 16px 10px;
  border-bottom: 1px solid #f1f5f9;
}

.card-title {
  font-size: 0.97rem;
  font-weight: 700;
  color: #1a2332;
  margin-bottom: 8px;
}

.badges { display: flex; gap: 6px; flex-wrap: wrap; }

.badge {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.73rem;
  font-weight: 700;
}

/* Status */
.b-s-لم-تبدأ    { background:#f1f5f9; color:#475569; }
.b-s-قيد-التنفيذ { background:#dbeafe; color:#1d4ed8; }
.b-s-تم-التنفيذ  { background:#dcfce7; color:#15803d; }
.b-s-كنسل        { background:#fee2e2; color:#b91c1c; }

/* Urgency */
.b-u-1 { background:#fee2e2; color:#b91c1c; }
.b-u-2 { background:#ffedd5; color:#c2410c; }
.b-u-3 { background:#fef3c7; color:#92400e; }
.b-u-4 { background:#f0fdf4; color:#15803d; }

.card-body { padding: 12px 16px; }

.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 7px;
  font-size: 0.83rem;
}
.info-key { color: #94a3b8; }
.info-val { color: #334155; font-weight: 600; }

.dl-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.78rem;
  font-weight: 700;
}
.dl-منتهي    { background:#fee2e2; color:#b91c1c; }
.dl-خطر     { background:#ffedd5; color:#c2410c; }
.dl-قريب-جدا { background:#fef3c7; color:#92400e; }
.dl-قريب    { background:#fefce8; color:#a16207; }
.dl-مريح    { background:#f0fdf4; color:#15803d; }

.no-tasks {
  grid-column: 1/-1;
  text-align: center;
  padding: 60px 20px;
  color: #94a3b8;
  font-size: 1.1rem;
}

.last-upd {
  text-align: center;
  color: #94a3b8;
  font-size: 0.78rem;
  padding: 0 0 16px;
  grid-column: 1/-1;
}

@media (max-width: 640px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .tasks-wrap { grid-template-columns: 1fr; padding: 4px 12px 24px; }
  .topbar { padding: 12px 14px; }
  .filter-bar { padding: 10px 12px; }
  .stats-row { padding: 14px 12px 4px; }
}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginScreen">
  <div class="login-logo">📋 EL LWAA</div>
  <div class="login-tagline">اختر قسمك لعرض المهام</div>
  <div class="dept-grid" id="deptGrid"></div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard">
  <div class="topbar">
    <span class="topbar-title">📋 شريط المهام</span>
    <div class="topbar-right">
      <span class="dept-pill" id="deptLabel"></span>
      <button class="back-btn" onclick="goBack()">← رجوع</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-box s-total">
      <div class="stat-num" id="sTotal">0</div>
      <div class="stat-label">إجمالي المهام</div>
    </div>
    <div class="stat-box s-new">
      <div class="stat-num" id="sNew">0</div>
      <div class="stat-label">لم تبدأ</div>
    </div>
    <div class="stat-box s-active">
      <div class="stat-num" id="sActive">0</div>
      <div class="stat-label">قيد التنفيذ</div>
    </div>
    <div class="stat-box s-urgent">
      <div class="stat-num" id="sUrgent">0</div>
      <div class="stat-label">خطر / منتهي</div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="f-btn active" data-f="الكل">الكل</button>
    <button class="f-btn" data-f="لم تبدأ">لم تبدأ</button>
    <button class="f-btn" data-f="قيد التنفيذ">قيد التنفيذ</button>
    <button class="f-btn" data-f="تم التنفيذ">تم التنفيذ</button>
    <button class="f-btn" data-f="كنسل">كنسل</button>
  </div>

  <div class="tasks-wrap" id="tasksGrid">
    <div class="last-upd" id="lastUpd"></div>
  </div>
</div>

<script>
// ============================================================
// CONFIG — غير الرابط ده بعد ما ترفع tasks.json على GitHub
// ============================================================
const DATA_URL = 'https://raw.githubusercontent.com/ameerellwaa-rgb/task-tracker/main/tasks.json';

const DEPTS = [
  { name:'قسم مصر',           icon:'🇪🇬', key:'egypt'      },
  { name:'قسم السعودية',       icon:'🇸🇦', key:'saudi'      },
  { name:'قسم الاكونت مانجر', icon:'👥', key:'account'    },
  { name:'قسم الكواليتي',     icon:'✅', key:'quality'    },
  { name:'قسم PR',             icon:'📣', key:'pr'         },
  { name:'قسم القضايا',        icon:'⚖️', key:'legal'      },
  { name:'قسم الشركات',        icon:'🏢', key:'companies'  },
  { name:'قسم التعقيب',        icon:'🔄', key:'followup'   },
  { name:'قسم الحسابات',       icon:'💰', key:'accounting' },
  { name:'قسم المونتير',       icon:'🎬', key:'media'      },
  { name:'قسم السيلز',         icon:'📈', key:'sales'      },
  { name:'قسم CRM',            icon:'🗂️', key:'crm'        },
  { name:'أخرى (الإدارة)',     icon:'🏛️', key:'management' },
];

// بيانات تجريبية تظهر لو الـ JSON على GitHub لسه مش موجود
const DEMO = [
  { dept:'قسم مصر',     title:'مهمة تجريبية',   owner:'أمير',   urgency:'مهم ومستعجل',        status:'لم تبدأ',      startDate:'01/07/2026', deadline:'31/07/2026', daysLeft:30, deadlineStatus:'مريح',    notes:'' },
  { dept:'قسم السعودية', title:'تجديد رخصة X',   owner:'محمد',   urgency:'مهم ومستعجل',        status:'قيد التنفيذ',  startDate:'01/07/2026', deadline:'05/07/2026', daysLeft:4,  deadlineStatus:'قريب جدا', notes:'تحت المراجعة' },
  { dept:'قسم الكواليتي',title:'مراجعة الإجراءات',owner:'سارة',   urgency:'مهم ومش مستعجل',    status:'لم تبدأ',      startDate:'01/07/2026', deadline:'02/07/2026', daysLeft:1,  deadlineStatus:'خطر',     notes:'' },
  { dept:'قسم السيلز',  title:'متابعة عروض أسعار',owner:'علي',   urgency:'مستعجل ومش مهم',    status:'قيد التنفيذ',  startDate:'25/06/2026', deadline:'03/07/2026', daysLeft:2,  deadlineStatus:'خطر',     notes:'' },
  { dept:'قسم PR',      title:'نشرة الشبكات',    owner:'نورا',   urgency:'مش مستعجل ومش مهم', status:'لم تبدأ',      startDate:'01/07/2026', deadline:'15/07/2026', daysLeft:14, deadlineStatus:'قريب',    notes:'' },
];

let allTasks = [];
let activeDept = '';
let activeFilter = 'الكل';

// ===== INIT =====
window.addEventListener('DOMContentLoaded', () => {
  // Build dept grid
  document.getElementById('deptGrid').innerHTML = DEPTS.map(d =>
    `<div class="dept-card" onclick="selectDept('${d.name}')">
       <div class="dept-icon">${d.icon}</div>${d.name}
     </div>`
  ).join('');

  // Filter buttons
  document.querySelectorAll('.f-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.f;
      renderCards();
    });
  });

  // URL param shortcut (e.g. ?dept=egypt)
  const p = new URLSearchParams(location.search).get('dept');
  if (p) {
    const d = DEPTS.find(x => x.key === p);
    if (d) selectDept(d.name);
  }
});

// ===== SELECT DEPT =====
async function selectDept(deptName) {
  activeDept = deptName;

  try {
    const r = await fetch(DATA_URL + '?_=' + Date.now());
    const json = await r.json();
    allTasks = json.tasks || [];
    document.getElementById('lastUpd').textContent = 'آخر تحديث: ' + (json.lastUpdated || '—');
  } catch {
    allTasks = DEMO;
    document.getElementById('lastUpd').textContent = '⚠️ بيانات تجريبية — tasks.json على GitHub لم يُعثر عليه';
  }

  activeFilter = 'الكل';
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.f-btn[data-f="الكل"]').classList.add('active');

  document.getElementById('deptLabel').textContent = deptName;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  updateStats();
  renderCards();
}

function goBack() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}

// ===== STATS =====
function updateStats() {
  const t = allTasks.filter(x => x.dept === activeDept);
  document.getElementById('sTotal').textContent  = t.length;
  document.getElementById('sNew').textContent    = t.filter(x => x.status === 'لم تبدأ').length;
  document.getElementById('sActive').textContent = t.filter(x => x.status === 'قيد التنفيذ').length;
  document.getElementById('sUrgent').textContent = t.filter(x => x.deadlineStatus === 'خطر' || x.deadlineStatus === 'منتهي').length;
}

// ===== RENDER CARDS =====
function renderCards() {
  let tasks = allTasks.filter(x => x.dept === activeDept);
  if (activeFilter !== 'الكل') tasks = tasks.filter(x => x.status === activeFilter);

  const urgClass = {
    'مهم ومستعجل':'b-u-1', 'مهم ومش مستعجل':'b-u-2',
    'مستعجل ومش مهم':'b-u-3', 'مش مستعجل ومش مهم':'b-u-4'
  };
  const stClass = s => 'b-s-' + s.replace(/ /g,'-');
  const dlClass = d => 'dl-' + d.replace(/ /g,'-');
  const dlIcon  = { 'منتهي':'⛔','خطر':'🔴','قريب جدا':'🟠','قريب':'🟡','مريح':'🟢' };

  const grid = document.getElementById('tasksGrid');

  const cards = tasks.length === 0
    ? '<div class="no-tasks">🎉 لا توجد مهام في هذه الفئة</div>'
    : tasks.map(t => `
      <div class="task-card" data-ds="${t.deadlineStatus}">
        <div class="card-head">
          <div class="card-title">${t.title}</div>
          <div class="badges">
            <span class="badge ${stClass(t.status)}">${t.status}</span>
            <span class="badge ${urgClass[t.urgency] || ''}">${t.urgency}</span>
          </div>
        </div>
        <div class="card-body">
          ${t.description ? `<div class="info-row"><span class="info-key">الوصف</span><span class="info-val">${t.description}</span></div>` : ''}
          <div class="info-row"><span class="info-key">المسؤول</span><span class="info-val">👤 ${t.owner}</span></div>
          <div class="info-row"><span class="info-key">البداية</span><span class="info-val">${t.startDate}</span></div>
          <div class="info-row"><span class="info-key">الديدلاين</span><span class="info-val">${t.deadline}</span></div>
          <div class="info-row">
            <span class="info-key">حالة المدة</span>
            <span class="dl-pill ${dlClass(t.deadlineStatus)}">
              ${dlIcon[t.deadlineStatus] || ''} ${t.deadlineStatus} · ${t.daysLeft} يوم
            </span>
          </div>
          ${t.notes ? `<div class="info-row"><span class="info-key">ملاحظات</span><span class="info-val">${t.notes}</span></div>` : ''}
        </div>
      </div>`
    ).join('');

  grid.innerHTML = cards + `<div class="last-upd" id="lastUpd">${document.getElementById('lastUpd')?.textContent || ''}</div>`;
}
</script>
</body>
</html>
